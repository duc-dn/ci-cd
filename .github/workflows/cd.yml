name: CD Docker Build & Push

on:
  push:
    branches: [ main ]  # Chỉ chạy khi merge/push lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short git commit SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Ví dụ repo tên là: ducdn01/ci-cd-demo
          # Thay thế 'ci-cd-demo' bằng tên thực tế bạn muốn lưu trữ image
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-demo:latest, ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-demo:${{ steps.vars.outputs.short_sha }}
